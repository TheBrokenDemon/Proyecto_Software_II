<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Recuperar acceso — Sentir
  </title>

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/landing.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/forms.css">
<link rel="stylesheet" href="../css/auth.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

  <!-- ══════════════════════════════════════════
       PANTALLA: RECUPERAR ACCESO
  ══════════════════════════════════════════ -->
  <div id="screen-recovery" class="screen active">

    <div class="auth-layout">

      <!-- PANEL FORMULARIO -->
      <div class="auth-panel">

        <button
          class="back-btn"
          onclick="showScreen('screen-login')"
        >
          ← Volver
        </button>

        <div class="auth-header">

          <div class="logo-mark small">
            ✦
          </div>

          <h2>
            Recuperar acceso
          </h2>

          <p>
            Te enviaremos un enlace a tu correo
          </p>

        </div>

        <!-- FORMULARIO -->
        <div id="recovery-form">

          <div class="form-group">

            <label>
              Correo electrónico
            </label>

            <input
              type="email"
              id="recovery-email"
              placeholder="hola@ejemplo.com"
            />

          </div>

          <button
            class="btn-primary full"
            onclick="handleRecovery()"
          >
            Enviar enlace
          </button>

        </div>

        <!-- MENSAJE SUCCESS -->
        <div id="recovery-success" class="hidden">

          <div class="success-box">

            <div class="success-icon">
              ✉️
            </div>

            <h3>
              ¡Correo enviado!
            </h3>

            <p>
              Revisa tu bandeja de entrada y sigue las instrucciones
              para restablecer tu contraseña.
            </p>

            <button
              class="btn-ghost"
              onclick="showScreen('screen-login')"
            >
              Volver al inicio
            </button>

          </div>

        </div>

      </div>

      <!-- PANEL DECORATIVO -->
      <div class="auth-deco">

        <div class="deco-quote">
          "Todos merecemos<br />
          una segunda<br />
          oportunidad."
        </div>

        <div class="deco-author">
          — Sentir
        </div>

      </div>

    </div>

  </div>

  <!-- TYPESCRIPT -->
<script type="module" src="../dist/app.js"></script>
</body>

</html>
