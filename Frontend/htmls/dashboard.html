<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <title>Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/landing.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/forms.css">
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/responsive.css">

</head>

<body>

<nav class="navbar">

  <div class="nav-logo">

    ✦ MindCheck

  </div>

  <div class="nav-links">

    <button class="nav-btn active">
      Inicio
    </button>

    <button class="nav-btn">
      Historial
    </button>

    <button class="nav-btn">
      Perfil
    </button>

  </div>

  <button class="nav-logout"
    onclick="handleLogout()">

    Salir

  </button>

</nav>

<section class="dash-tab">

  <div class="dashboard-hero">

    <div class="hero-greeting">

      <span>Buenos días</span>

      <h2>Santiago</h2>

      <p>¿Cómo te sientes hoy?</p>

    </div>

  </div>

  <div class="survey-card-wrapper">

    <div class="survey-card"
      onclick="window.location.href='survey.html'">

      <div class="survey-card-icon">
        🌸
      </div>

      <div class="survey-card-content">

        <h3>Registro emocional</h3>

        <p>
          Tómate 2 minutos para conectar contigo.
        </p>

      </div>

    </div>

  </div>

</section>

<script type="module" src="../dist/app.js"></script>

</body>
</html>
